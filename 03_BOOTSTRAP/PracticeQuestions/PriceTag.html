<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>priceTag</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="/Apna_College_FullSDev/03_BOOTSTRAP/bootstrap.min.css">
</head>

<body>
    <!-- Note : we are using only bootstrap -->
    <div class="container mt-5">
        <h2 class="text-center mb-4"><u> Our Pricing </u></h2>

        <p class="text-center mb-4">Please checkout our most effecive payment models</p>
        <div class="row">
            <div class="col-12 col-md-4 mb-3">
                <div class="card text-bg-light mb-3" style="max-width: 18rem;">

                    <div class="card-header text-center fs-3">Free</div>
                    <div class="card-body">
                        <h5 class="card-title text-center fs-1">$0/mo <span class="fs-6">/month</span></h5>
                        <p class="card-text text-center">10 user included <br>2 GB of storage <br> Email Supports
                        </p>

                    </div>              
                </div>

            </div>

            <div class="col-12 col-md-4 mb-3">
                <div class="card text-bg-light mb-3" style="max-width: 18rem;">
                    <div class="card-header text-center fs-3">Pro</div>
                    <div class="card-body">
                        <h5 class="card-title text-center fs-1">$15 <span class="fs-6">/month</span></h5>
                        <p class="card-text text-center">20 user included <br>10 GB of storage <br> Email Supports
                        </p>

                    </div>
                </div>
            </div>



            <div class="col-12 col-md-4 mb-3">
                <div class="card text-bg-light mb-3" style="max-width: 18rem;">

                    <div class="card-header text-center fs-3">Enterprise</div>
                    <div class="card-body">
                        <h5 class="card-title text-center fs-1">$29 <span class="fs-6">/month</span></h5>
                        <p class="card-text text-center">30 user included <br>30 GB of storage <br> Email Supports
                            <br>Contact Support
                        </p>
                    </div>
                </div>

            </div>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
</body>

</html>
