<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum_Abhishek</title>
</head>

<body>
    <hr>
    <h3>Just Testing</h3>
    <!-- Creating buttoms in forum -->
    <!-- This below from action is used to reddirect to the buttom that is used -->
    <form action="/BC_Aag">
        <div>
            <label for="username">Username</label>
            <input type="text" placeholder="Enter username" id="username"><br>
        </div>
        <div>
            <label for="password">Password</label>
            <input type="password" placeholder="Enter password" id="password"><br>
        </div>
        <div>
            <label for="number">Number</label>
            <input type="number" id="number"><br>
        </div>
        <div>
            <label for="email">Email</label>
            <input type="email" id="email"><br>
        </div>
        <div>
            <label for="date">Date</label>
            <input type="date" id="date"><br>
        </div>
        <button>Submit</button>
        <button type="reset">Reset</button>
    </form>
    <hr>
    <!-- using name  attribute we can connect two diffrent pages -->
    <form action="https://www.youtube.com/results">
        <div>
            <input type="text" placeholder="UtubeSearch" name="search_query">
            <button>Search</button>
            <button type="reset">ClearItem</button>
        </div>
    </form>
    <hr>
</body>

</html>
