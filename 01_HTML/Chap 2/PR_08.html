<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice 8</title>
    <!-- Creating Search Option Redirect Search Option to Google -->
</head>
<center>
    <h1>Most Popular Search Engines</h1>
    <p>i just created a simple page where you can find all of search engines in just 1 platforms</p>
</center>

<body>
    <center><br><br><br><br>
        <hr>
        <h2>Redirecting to Google</h2>
        <form action="https://www.google.com/search"> Google Search <br>
            <input type="text" placeholder="Enter your search" name="q">
            <br>
            <button>Search</button>
        </form>

        <hr>
        <h2>Redirecting to DuckDuck Go</h2>
        <form action="https://duckduckgo.com/search"> DuckDuck Search <br>
            <input type="text" placeholder="Enter your search" name="q">
            <br>
            <button>Search</button>
        </form>

        <hr>
        <h2>Redirecting to Yahoo </h2>
        <form action="https://in.search.yahoo.com/search"> Yahoo Search <br>
            <input type="text" placeholder="Enter your search" name="q">
            <br>
            <button>Search</button>
        </form>
    </center>
    <hr>
</body>

</html>
