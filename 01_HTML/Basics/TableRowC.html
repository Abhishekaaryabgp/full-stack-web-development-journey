<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColSpanRowSpan</title>
</head>

<body>
    <table border="1">
        <caption>Something Interesting</caption>
        <thead>
            <tr>
                <th rowspan="2">Company</th>
                <th colspan="2">Employee</th>
            </tr>
            <tr>
                <th>ID</th>
                <th>Count</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Industry</td>
                <td>9</td>
                <td>66</td>
            </tr>
            <tr>
                <td>UnderBollt</td>
                <td>3</td>
                <td>66</td>
            </tr>
            <tr>
                <td>CrazyG</td>
                <td>1</td>
                <td>66</td>
            </tr>
        </tbody>

    </table>
</body>

</html>
