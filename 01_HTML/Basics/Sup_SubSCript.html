<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperScript&SubScript</title>
</head>

<body>
    <h4>Superscript Tag</h4>
    <hr>
    <div>
        <ul>
            <li>
                a+b<sup>2</sup> =
                a<sup>2</sup> + b<sup>2</sup> + 2ab
            </li>
        </ul>
    </div>
    <!-- Super script  -->
    <div>
        <ul>
            <li>
                a-b<sup>2</sup> =
                a<sup>2</sup> + b<sup>2</sup> - 2ab
            </li>
        </ul>
    </div>
    <hr>

    <h4> Subscript Tag</h4>
    <div>
        <ul>
            <li>
                a+b
                <sub>2</sub> = a<sub>2</sub> + b<sub>2</sub> +2ab
            </li>
        </ul>

        <div>
            <ul>
                <li>
                    a-b
                    <sub>2</sub> = a<sub>2</sub> + b<sub>2</sub> -2ab
                </li>
            </ul>

        </div>
    </div>
    <!-- Subscript -->
    <hr>
    <h4>Some Chemestry Formula </h4>
    <div>
        <ul>
            <li>
                H<sub>2</sub>0
            </li>
            <li>
                C<sub>6</sub>H<sub>12</sub>O<sub>6</sub></sub>
            </li>
        </ul>
    </div>
</body>

</html>
