<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alphaColor</title>
    <style>
        div {
            width: 200px;
            height: 200px;
            background-color: rgba(0, 255, 60, 0.296);
            transition: 1s;
        }

        div:hover {
            border-radius: 50%;
            background-color: black;
        }
    </style>
</head>

<body>
    <div>I am div using the rgba function</div>
</body>

</html>
